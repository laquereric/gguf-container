# =============================================================================
# podman-compose.qwen3-30b-a3b.yml — Qwen3-30B-A3B  •  Q4_K_M  •  ~18.6 GB
# Best quality for 24 GB Mac; MoE: 30B total / 3B active per token
# Thinking + non-thinking modes; 128K context; fast generation due to MoE
# Apache 2.0
#
# Download:
#   huggingface-cli download Qwen/Qwen3-30B-A3B-GGUF \
#     Qwen3-30B-A3B-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.qwen3-30b-a3b.yml up
#
# RAM budget at 24G: ~18.6 GB model; ~5 GB remaining for OS + KV cache — adequate
# =============================================================================

name: llama-mac-24g-qwen3-30b-a3b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Qwen3-30B-A3B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
