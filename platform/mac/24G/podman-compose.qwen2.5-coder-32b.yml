# =============================================================================
# podman-compose.qwen2.5-coder-32b.yml — Qwen2.5-Coder-32B-Instruct  •  Q4_K_M  •  ~20 GB
# Best local coding model; code generation, debugging, and completion; Apache 2.0
# 128K context; top open-weights code model overall
#
# ⚠  CLOSE ALL OTHER APPS — leaves ~4 GB for OS + KV cache
#
# Download:
#   huggingface-cli download bartowski/Qwen2.5-Coder-32B-Instruct-GGUF \
#     Qwen2.5-Coder-32B-Instruct-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.qwen2.5-coder-32b.yml up
#
# RAM budget at 24G: ~20 GB model; ~4 GB remaining for OS + KV cache — tight
# =============================================================================

name: llama-mac-24g-qwen2-5-coder-32b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Qwen2.5-Coder-32B-Instruct-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
