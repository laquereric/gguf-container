# =============================================================================
# podman-compose.mac-16g.yml — Mac with 16 GB unified memory
#
# Prerequisites:
#   1. Build the image:   bin/build.sh
#   2. Start the VM:      bin/start.sh
#   3. Download a model:  see huggingface-cli commands below
#
# Usage:
#   podman-compose -f podman-compose.mac-16g.yml up
#
# To switch models:
#   1. Comment out the active "llama-server:" block (or delete it)
#   2. Uncomment one of the ALTERNATIVES below
#   3. Re-run: podman-compose -f podman-compose.mac-16g.yml up
#
# RAM budget at 16 GB:  ~10–11 GB available for model + KV cache after OS.
#   • 7–8B models:   very comfortable; ctx-size 16384 safe
#   • 12–14B models: comfortable at Q4_K_M; ctx-size 8192 safe
# =============================================================================

name: llama-mac-16g

services:

  # ---------------------------------------------------------------------------
  # ACTIVE: Phi-4-14B  •  Q4_K_M  •  ~8.5 GB  •  best quality for 16 GB
  # Beats many 70B models on reasoning; MIT license; 16K context
  #
  # Download:
  #   huggingface-cli download bartowski/phi-4-GGUF \
  #     phi-4-Q4_K_M.gguf --local-dir ~/models
  # ---------------------------------------------------------------------------
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/phi-4-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3


# =============================================================================
# ALTERNATIVES — comment out the active block above, uncomment one below
# =============================================================================


