# =============================================================================
# podman-compose.mac-8g.yml — Mac with 8 GB unified memory
#
# Prerequisites:
#   1. Build the image:   bin/build.sh
#   2. Start the VM:      bin/start.sh
#   3. Download a model:  see huggingface-cli commands below
#
# Usage:
#   podman-compose -f podman-compose.mac-8g.yml up
#
# To switch models:
#   1. Comment out the active "llama-server:" block (or delete it)
#   2. Uncomment one of the ALTERNATIVES below
#   3. Re-run: podman-compose -f podman-compose.mac-8g.yml up
#
# RAM budget at 8 GB:  ~4 GB available for model + KV cache after OS overhead.
#   • 1–4B models:  comfortable; ctx-size 8192 safe
#   • 7B models:    tight; ctx-size 2048, close all other apps first
# =============================================================================

name: llama-mac-8g

services:

  # ---------------------------------------------------------------------------
  # ACTIVE: Qwen3-4B  •  Q4_K_M  •  ~2.8 GB  •  best quality for 8 GB
  # Reasoning + non-thinking modes, 128K context, Apache 2.0
  #
  # Download:
  #   huggingface-cli download Qwen/Qwen3-4B-GGUF \
  #     Qwen3-4B-Q4_K_M.gguf --local-dir ~/models
  # ---------------------------------------------------------------------------
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Qwen3-4B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3


