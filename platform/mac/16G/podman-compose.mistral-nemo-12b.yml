# =============================================================================
# podman-compose.mistral-nemo-12b.yml — Mistral-Nemo-12B-Instruct  •  Q4_K_M  •  ~7.5 GB
# 128K context; Apache 2.0; sliding window attention; NVIDIA collaboration
# Best for RAG, long documents, and summarization on 16 GB Mac
#
# Download:
#   huggingface-cli download bartowski/Mistral-Nemo-Instruct-2407-GGUF \
#     Mistral-Nemo-Instruct-2407-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.mistral-nemo-12b.yml up
#
# RAM budget at 16G: ~7.5 GB model; comfortable fit; good KV cache headroom for long docs
# =============================================================================

name: llama-mac-16g-mistral-nemo-12b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Mistral-Nemo-Instruct-2407-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
