# =============================================================================
# podman-compose.gemma3-12b.yml — Gemma-3-12B (Google QAT)  •  Q4_0  •  ~7.0 GB
# Official QAT quant from Google; multimodal (text + image); 128K context
# Gemma Terms of Service (free for research and commercial up to certain thresholds)
#
# Download:
#   huggingface-cli download google/gemma-3-12b-it-qat-q4_0-gguf \
#     gemma-3-12b-it-q4_0.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.gemma3-12b.yml up
#
# RAM budget at 16G: ~7.0 GB model; comfortable fit with generous KV cache headroom
# Note: vision requires a llama.cpp build with vision support enabled
# =============================================================================

name: llama-mac-16g-gemma3-12b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/gemma-3-12b-it-q4_0.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
