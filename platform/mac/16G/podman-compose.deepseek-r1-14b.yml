# =============================================================================
# podman-compose.deepseek-r1-14b.yml — DeepSeek-R1-Distill-Qwen-14B  •  Q4_K_M  •  ~9.0 GB
# Best reasoning on 16 GB; o1-class chain-of-thought; Apache 2.0
# Note: generates thinking tokens — total output length is longer than final answer
#
# Download:
#   huggingface-cli download bartowski/DeepSeek-R1-Distill-Qwen-14B-GGUF \
#     DeepSeek-R1-Distill-Qwen-14B-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.deepseek-r1-14b.yml up
#
# RAM budget at 16G: ~9.0 GB model; ~7 GB remaining for OS + KV cache — comfortable
# =============================================================================

name: llama-mac-16g-deepseek-r1-14b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/DeepSeek-R1-Distill-Qwen-14B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
