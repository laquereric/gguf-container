# =============================================================================
# podman-compose.qwen3-8b.yml — Qwen3-8B  •  Q4_K_M  •  ~5.0 GB
# Thinking + non-thinking modes; comfortable fit with generous KV headroom
# Apache 2.0; strong reasoning at 5 GB footprint; good fast-session model
#
# Download:
#   huggingface-cli download Qwen/Qwen3-8B-GGUF \
#     Qwen3-8B-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.qwen3-8b.yml up
#
# RAM budget at 16G: ~5.0 GB model; ~11 GB remaining — excellent KV cache headroom
# =============================================================================

name: llama-mac-16g-qwen3-8b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Qwen3-8B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
