# =============================================================================
# podman-compose.llama4-maverick.yml — Llama-4-Maverick  •  Q2_K  •  ~168 GB
# MoE: 402B total / 17B active per token; multimodal; 1M token context window
# Meta license; Q2_K gives substantially better quality than IQ1_S
# Comfortable fit at 256 GB — best long-context multimodal at this RAM tier
#
# Download (sharded — llama-server auto-loads all shards from first file):
#   huggingface-cli download unsloth/Llama-4-Maverick-17B-128E-Instruct-GGUF \
#     --include "Llama-4-Maverick-17B-128E-Instruct-Q2_K*.gguf" \
#     --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.llama4-maverick.yml up
#
# RAM budget at 256G: ~168 GB model; ~88 GB remaining for OS + KV cache — comfortable
# Note: vision requires a llama.cpp build with vision support enabled
# =============================================================================

name: llama-mac-256g-llama4-maverick

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Llama-4-Maverick-17B-128E-Instruct-Q2_K-00001-of-00007.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 32768
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
