# =============================================================================
# podman-compose.mixtral-8x22b.yml — Mixtral-8x22B-Instruct  •  Q5_K_M  •  ~92 GB
# Sparse MoE: 141B total / 39B active; higher quality than Q2_K; Apache 2.0
# 64K context; all expert weights must reside in RAM
#
# Download (sharded — llama-server auto-loads all shards from first file):
#   huggingface-cli download TheBloke/Mixtral-8x22B-Instruct-v0.1-GGUF \
#     --include "mixtral-8x22b-instruct-v0.1.Q5_K_M*.gguf" \
#     --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.mixtral-8x22b.yml up
#
# RAM budget at 128G: ~92 GB model; ~36 GB remaining for OS + KV cache — comfortable
# =============================================================================

name: llama-mac-128g-mixtral-8x22b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/mixtral-8x22b-instruct-v0.1.Q5_K_M-00001-of-00005.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 32768
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
