# =============================================================================
# podman-compose.deepseek-r1-llama-70b.yml — DeepSeek-R1-Distill-Llama-70B  •  Q8_0  •  ~75 GB
# Near-lossless reasoning quality; o1-class chain-of-thought; Apache 2.0
# Best reasoning model config for 128 GB Mac
# Generates thinking tokens — total output is longer than the final answer
#
# Download (sharded — llama-server auto-loads all shards from first file):
#   huggingface-cli download bartowski/DeepSeek-R1-Distill-Llama-70B-GGUF \
#     --include "DeepSeek-R1-Distill-Llama-70B-Q8_0*.gguf" \
#     --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.deepseek-r1-llama-70b.yml up
#
# RAM budget at 128G: ~75 GB model; ~53 GB remaining — comfortable
# =============================================================================

name: llama-mac-128g-deepseek-r1-llama-70b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/DeepSeek-R1-Distill-Llama-70B-Q8_0-00001-of-00002.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
