# =============================================================================
# podman-compose.command-r-plus.yml — Command-R+ 104B  •  IQ3_XS  •  ~43.6 GB
# Best RAG quality with 104B capacity; native tool use; 23 languages; 128K context
# CC-BY-NC license — non-commercial use only without a Cohere enterprise agreement
# IQ3_XS retains strong quality while fitting comfortably in 64 GB
#
# Download:
#   huggingface-cli download bartowski/c4ai-command-r-plus-GGUF \
#     c4ai-command-r-plus-IQ3_XS.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.command-r-plus.yml up
#
# RAM budget at 64G: ~43.6 GB model; ~20 GB remaining for OS + KV cache — comfortable
# =============================================================================

name: llama-mac-64g-command-r-plus

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/c4ai-command-r-plus-IQ3_XS.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
