# =============================================================================
# podman-compose.llama3.3-70b.yml — Llama-3.3-70B-Instruct  •  Q4_K_M  •  ~43 GB
# Best dense general-purpose model for 64 GB Mac; matches 405B quality; Meta license
# 128K context; best open-weights 70B class model as of early 2026
#
# Download:
#   huggingface-cli download bartowski/Llama-3.3-70B-Instruct-GGUF \
#     Llama-3.3-70B-Instruct-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.llama3.3-70b.yml up
#
# RAM budget at 64G: ~43 GB model; ~21 GB remaining for OS + KV cache — comfortable
# =============================================================================

name: llama-mac-64g-llama3-3-70b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Llama-3.3-70B-Instruct-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
