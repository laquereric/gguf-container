# =============================================================================
# podman-compose.deepseek-r1-llama-70b.yml — DeepSeek-R1-Distill-Llama-70B  •  Q4_K_M  •  ~43 GB
# Best reasoning for 64 GB Mac; o1-class chain-of-thought on Llama 3.1 base
# Apache 2.0; generates thinking tokens before the final answer
#
# Download:
#   huggingface-cli download bartowski/DeepSeek-R1-Distill-Llama-70B-GGUF \
#     DeepSeek-R1-Distill-Llama-70B-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.deepseek-r1-llama-70b.yml up
#
# RAM budget at 64G: ~43 GB model; ~21 GB remaining — comfortable; use lower ctx-size
# to keep KV cache manageable given reasoning tokens can be lengthy
# =============================================================================

name: llama-mac-64g-deepseek-r1-llama-70b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/DeepSeek-R1-Distill-Llama-70B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
