# =============================================================================
# podman-compose.command-r-35b.yml — Command-R 35B  •  Q4_K_M  •  ~22 GB
# Best RAG model; native tool use; 23 languages; 128K context; CC-BY-NC license
# ⚠ License: non-commercial use only without a Cohere enterprise agreement
# Comfortable fit on 32 GB; best choice for document Q&A and long-form summarization
#
# Download:
#   huggingface-cli download bartowski/c4ai-command-r-GGUF \
#     c4ai-command-r-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.command-r-35b.yml up
#
# RAM budget at 32G: ~22 GB model; ~10 GB remaining for OS + KV cache — comfortable
# =============================================================================

name: llama-mac-32g-command-r-35b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/c4ai-command-r-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
