# =============================================================================
# podman-compose.yi-34b-200k.yml — Yi-34B-Chat-200K  •  Q4_K_M  •  ~20.7 GB
# 200K token context window; comfortable fit on 32 GB; Apache 2.0
# Best for very long documents; use 32K ctx on 32 GB for practical KV budget
#
# Download:
#   huggingface-cli download LoneStriker/Yi-34B-Chat-200K-GGUF \
#     Yi-34B-Chat-200K-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.yi-34b-200k.yml up
#
# RAM budget at 32G: ~20.7 GB model; ~11 GB remaining — comfortable fit
# =============================================================================

name: llama-mac-32g-yi-34b-200k

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Yi-34B-Chat-200K-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 32768
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
