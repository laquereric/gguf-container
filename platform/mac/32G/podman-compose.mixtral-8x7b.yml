# =============================================================================
# podman-compose.mixtral-8x7b.yml — Mixtral-8x7B-Instruct  •  Q4_K_M  •  ~26.4 GB
# Sparse MoE: 46.7B total / 12.9B active per token; Apache 2.0; 32K context
# Note: all expert weights must be in RAM even though only 2/8 activate per token
#
# ⚠  Requires all other apps closed — leaves ~5 GB for OS + KV cache
#
# Download:
#   huggingface-cli download TheBloke/Mixtral-8x7B-Instruct-v0.1-GGUF \
#     mixtral-8x7b-instruct-v0.1.Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.mixtral-8x7b.yml up
#
# RAM budget at 32G: ~26.4 GB model; ~5 GB remaining for OS + KV cache — tight
# =============================================================================

name: llama-mac-32g-mixtral-8x7b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/mixtral-8x7b-instruct-v0.1.Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
