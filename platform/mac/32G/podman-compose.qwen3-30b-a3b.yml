# =============================================================================
# podman-compose.qwen3-30b-a3b.yml — Qwen3-30B-A3B  •  Q6_K  •  ~24 GB
# Higher fidelity quant; comfortable on 32 GB; Apache 2.0
# MoE: 30B total / 3B active per token — fast generation; thinking + non-thinking modes
# Q6_K gives ~99% of F16 quality; best use of the extra headroom vs 24 GB tier
#
# Download:
#   huggingface-cli download Qwen/Qwen3-30B-A3B-GGUF \
#     Qwen3-30B-A3B-Q6_K.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.qwen3-30b-a3b.yml up
#
# RAM budget at 32G: ~24 GB model; ~8 GB remaining for OS + KV cache — comfortable
# =============================================================================

name: llama-mac-32g-qwen3-30b-a3b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Qwen3-30B-A3B-Q6_K.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 32768
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
