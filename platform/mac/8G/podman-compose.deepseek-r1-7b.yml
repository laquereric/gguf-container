# =============================================================================
# podman-compose.deepseek-r1-7b.yml — DeepSeek-R1-Distill-Qwen-7B  •  Q4_K_M  •  ~4.7 GB
# Best reasoning on 8 GB; o1-class chain-of-thought; Apache 2.0
# Note: generates thinking tokens — total output is longer than the final answer
#
# ⚠  CLOSE ALL OTHER APPS before starting — leaves ~3 GB for OS + KV cache
#
# Download:
#   huggingface-cli download bartowski/DeepSeek-R1-Distill-Qwen-7B-GGUF \
#     DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.deepseek-r1-7b.yml up
#
# RAM budget at 8G: ~4.7 GB model; ~3 GB remaining for OS + KV cache — tight
# =============================================================================

name: llama-mac-8g-deepseek-r1-7b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 2048
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
