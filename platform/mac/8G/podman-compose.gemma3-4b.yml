# =============================================================================
# podman-compose.gemma3-4b.yml — Gemma-3-4B (Google QAT)  •  Q4_0  •  ~2.5 GB
# Official QAT quant from Google; multimodal (text + image); 128K context
# Gemma Terms of Service (free for research and commercial up to certain thresholds)
#
# Download:
#   huggingface-cli download google/gemma-3-4b-it-qat-q4_0-gguf \
#     gemma-3-4b-it-q4_0.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.gemma3-4b.yml up
#
# RAM budget at 8G: ~2.5 GB model; comfortable fit
# Note: vision requires a llama.cpp build with vision support enabled
# =============================================================================

name: llama-mac-8g-gemma3-4b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/gemma-3-4b-it-q4_0.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
