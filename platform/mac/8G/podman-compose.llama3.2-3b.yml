# =============================================================================
# podman-compose.llama3.2-3b.yml — Llama-3.2-3B-Instruct  •  Q5_K_M  •  ~2.3 GB
# Fastest useful model on 8 GB Mac; ~45 tok/s on M1 Air; Meta Llama license
# Best choice when response speed matters more than reasoning depth
#
# Download:
#   huggingface-cli download bartowski/Llama-3.2-3B-Instruct-GGUF \
#     Llama-3.2-3B-Instruct-Q5_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.llama3.2-3b.yml up
#
# RAM budget at 8G: ~2.3 GB model; very comfortable; plenty of KV cache headroom
# =============================================================================

name: llama-mac-8g-llama3-2-3b

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Llama-3.2-3B-Instruct-Q5_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
