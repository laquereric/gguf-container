# =============================================================================
# podman-compose.phi4-mini-reasoning.yml — Phi-4-mini-reasoning  •  Q4_K_M  •  ~2.5 GB
# Compact chain-of-thought model; best math reasoning under 3 GB; MIT license
# Generates thinking tokens like R1 distills but at 3.8B parameter footprint
#
# Download:
#   huggingface-cli download unsloth/Phi-4-mini-reasoning-GGUF \
#     Phi-4-mini-reasoning-Q4_K_M.gguf --local-dir ~/models
#
# Usage:
#   podman-compose -f podman-compose.phi4-mini-reasoning.yml up
#
# RAM budget at 8G: ~2.5 GB model; comfortable fit with ample KV cache headroom
# =============================================================================

name: llama-mac-8g-phi4-mini-reasoning

services:
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Phi-4-mini-reasoning-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
