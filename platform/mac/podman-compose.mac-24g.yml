# =============================================================================
# podman-compose.mac-24g.yml — Mac with 24 GB unified memory
#
# Prerequisites:
#   1. Build the image:   bin/build.sh
#   2. Start the VM:      bin/start.sh
#   3. Download a model:  see huggingface-cli commands below
#
# Usage:
#   podman-compose -f podman-compose.mac-24g.yml up
#
# To switch models:
#   1. Comment out the active "llama-server:" block (or delete it)
#   2. Uncomment one of the ALTERNATIVES below
#   3. Re-run: podman-compose -f podman-compose.mac-24g.yml up
#
# RAM budget at 24 GB:  ~18–20 GB available for model + KV cache after OS.
#   • 14B models:    very comfortable; ctx-size 32768 safe
#   • 27B models:    comfortable at Q4_K_M; ctx-size 16384 safe
#   • 32B models:    tight at Q4_K_M (~20 GB); ctx-size 8192; close other apps
# =============================================================================

name: llama-mac-24g

services:

  # ---------------------------------------------------------------------------
  # ACTIVE: Qwen3-30B-A3B  •  Q4_K_M  •  ~18.6 GB  •  best quality for 24 GB
  # MoE: 30B total / 3B active per token — high capacity, fast generation
  # Thinking + non-thinking modes; 128K context; Apache 2.0
  #
  # Download:
  #   huggingface-cli download Qwen/Qwen3-30B-A3B-GGUF \
  #     Qwen3-30B-A3B-Q4_K_M.gguf --local-dir ~/models
  # ---------------------------------------------------------------------------
  llama-server:
    image: localhost/llama-cpp-vulkan:latest
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/models:/models:z
    ports:
      - "8080:8080"
    command: >
      -m /models/Qwen3-30B-A3B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 16384
      --flash-attn
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3


# =============================================================================
# ALTERNATIVES — comment out the active block above, uncomment one below
# =============================================================================


